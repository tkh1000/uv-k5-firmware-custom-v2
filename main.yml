name: Build Firmware – Messenger + Scrambler

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # -----------------------------------------------------------------------
    # 1. Checkout the F4HWN V1/V2 firmware repo
    # -----------------------------------------------------------------------
    - name: Checkout firmware
      uses: actions/checkout@v4
      with:
        repository: armel/uv-k5-firmware-custom
        ref: main
        path: firmware

    # -----------------------------------------------------------------------
    # 2. Copy our new source files into the firmware tree
    # -----------------------------------------------------------------------
    - name: Inject new source files
      run: |
        cp Helper/fsk.h     firmware/Helper/fsk.h
        cp Helper/fsk.c     firmware/Helper/fsk.c
        cp Helper/crypto.h  firmware/Helper/crypto.h
        cp Helper/crypto.c  firmware/Helper/crypto.c
        cp App/bk4819_fsk.h firmware/App/bk4819_fsk.h
        cp App/bk4819_fsk.c firmware/App/bk4819_fsk.c
        cp App/messenger.h  firmware/App/messenger.h
        cp App/messenger.c  firmware/App/messenger.c
        cp App/scrambler.h  firmware/App/scrambler.h

    # -----------------------------------------------------------------------
    # 3. Patch settings.h — add MESSENGER_KEY[32] + MESSENGER_CALLSIGN[11]
    #    + SCRAMBLER_ENABLED to the EEPROM_Config_t struct
    # -----------------------------------------------------------------------
    - name: Patch settings.h
      run: |
        python3 - <<'PYEOF'
        import re, sys

        candidates = [
            "firmware/settings.h",
            "firmware/Settings/settings.h",
            "firmware/include/settings.h",
        ]

        path = None
        for c in candidates:
            try:
                with open(c) as f:
                    content = f.read()
                path = c
                break
            except FileNotFoundError:
                continue

        if path is None:
            print("ERROR: settings.h not found", file=sys.stderr)
            sys.exit(1)

        # Guard: skip if already patched
        if "MESSENGER_KEY" in content:
            print(f"settings.h already patched ({path}), skipping.")
            sys.exit(0)

        # Find closing brace of EEPROM_Config_t struct
        # Insert before the last '}' that closes the struct
        patch_block = (
            "\n"
            "    // --- Messenger / Scrambler (added by CI patch) ---\n"
            "    uint8_t  MESSENGER_KEY[32];         // ChaCha20-256 shared key\n"
            "    char     MESSENGER_CALLSIGN[11];    // local callsign (null-terminated)\n"
            "    uint8_t  SCRAMBLER_ENABLED;         // 0=off, 1=on\n"
        )

        # Strategy: insert before the last '} EEPROM_Config_t;' pattern
        patched = re.sub(
            r'(\}\s*EEPROM_Config_t\s*;)',
            patch_block + r'\1',
            content,
            count=1
        )

        if patched == content:
            # Fallback: insert before closing brace of a typedef struct block
            patched = re.sub(
                r'(\n\}\s*;)',
                patch_block + r'\1',
                content,
                count=1
            )

        if patched == content:
            print("ERROR: could not locate struct closing brace in settings.h", file=sys.stderr)
            sys.exit(1)

        with open(path, 'w') as f:
            f.write(patched)

        print(f"Patched {path}")
        PYEOF

    # -----------------------------------------------------------------------
    # 4. Patch app.c — wire MSG_Init, MSG_TimeSlice10ms, MSG_HandleKey,
    #    PTT press/release for scrambler TX enable/disable,
    #    and squelch open/close for scrambler RX enable/disable
    # -----------------------------------------------------------------------
    - name: Patch app.c
      run: |
        python3 - <<'PYEOF'
        import re, sys

        candidates = [
            "firmware/app/app.c",
            "firmware/App/app.c",
            "firmware/src/app.c",
        ]

        path = None
        content = None
        for c in candidates:
            try:
                with open(c) as f:
                    content = f.read()
                path = c
                break
            except FileNotFoundError:
                continue

        if path is None:
            print("ERROR: app.c not found", file=sys.stderr)
            sys.exit(1)

        if "MSG_Init" in content:
            print(f"app.c already patched ({path}), skipping.")
            sys.exit(0)

        # ---- 4a. Add includes near top (after last existing #include) ----
        includes = (
            '#include "App/messenger.h"\n'
            '#include "App/scrambler.h"\n'
        )
        content = re.sub(
            r'(#include\s+"[^"]+"\s*\n)(?!#include)',
            r'\1' + includes,
            content,
            count=1
        )

        # ---- 4b. Init hook — call MSG_Init() inside APP_Init() or equivalent ----
        content = re.sub(
            r'(void\s+APP_Init\s*\(.*?\)\s*\{)',
            r'\1\n    MSG_Init();',
            content,
            count=1,
            flags=re.DOTALL
        )

        # ---- 4c. Timeslice hook — call MSG_TimeSlice10ms() in 10ms tick ----
        # Look for an existing 10ms timeslice function
        content = re.sub(
            r'(void\s+APP_TimeSlice10ms\s*\(.*?\)\s*\{)',
            r'\1\n    if (MSG_IsActive()) MSG_TimeSlice10ms();',
            content,
            count=1,
            flags=re.DOTALL
        )

        # ---- 4d. Key handler hook ----
        # Intercept key events when messenger is active
        content = re.sub(
            r'(void\s+APP_ProcessKey\s*\(.*?\)\s*\{)',
            r'\1\n    if (MSG_IsActive()) { MSG_HandleKey(Key, bKeyPressed, bKeyHeld); return; }',
            content,
            count=1,
            flags=re.DOTALL
        )

        # ---- 4e. PTT press → SCRAMBLER_Enable(), PTT release → SCRAMBLER_Disable() ----
        # Find PTT press handler pattern (varies by firmware version; probe both)
        ptt_press_pattern = re.compile(
            r'(case\s+KEY_PTT\s*:.*?)(//|bk4819|BK4819|RADIO_PrepareTX)',
            re.DOTALL
        )
        if ptt_press_pattern.search(content):
            content = ptt_press_pattern.sub(
                r'\1SCRAMBLER_Enable();\n    \2',
                content,
                count=1
            )
        else:
            # Fallback: look for the PTX/TX start call directly
            content = re.sub(
                r'(RADIO_PrepareTX\s*\(\s*\)\s*;)',
                r'SCRAMBLER_Enable();\n    \1',
                content,
                count=1
            )

        # PTT release / TX end
        content = re.sub(
            r'(RADIO_ReleaseTX\s*\(\s*\)\s*;|APP_EndTransmission\s*\(\s*\)\s*;)',
            r'\1\n    SCRAMBLER_Disable();',
            content,
            count=1
        )

        # ---- 4f. Squelch open → SCRAMBLER_Enable() for RX de-scramble ----
        content = re.sub(
            r'(AUDIO_AudioBegin\s*\(\s*\)\s*;|squelch.*?open.*?;)',
            r'\1\n    SCRAMBLER_Enable();',
            content,
            count=1,
            flags=re.IGNORECASE
        )

        # Squelch close → SCRAMBLER_Disable()
        content = re.sub(
            r'(AUDIO_AudioEnd\s*\(\s*\)\s*;|squelch.*?close.*?;)',
            r'\1\n    SCRAMBLER_Disable();',
            content,
            count=1,
            flags=re.IGNORECASE
        )

        with open(path, 'w') as f:
            f.write(content)

        print(f"Patched {path}")
        PYEOF

    # -----------------------------------------------------------------------
    # 5. Patch audio ADC read path — inject SCRAMBLER_ProcessSample()
    # -----------------------------------------------------------------------
    - name: Patch audio ADC path
      run: |
        python3 - <<'PYEOF'
        import re, sys, os

        # Probe candidate files for ADC read patterns
        candidates = [
            "firmware/App/audio.c",
            "firmware/app/audio.c",
            "firmware/App/app.c",
            "firmware/app/app.c",
            "firmware/driver/bk4819.c",
        ]

        adc_patterns = [
            r'(ADC_GetValue\s*\([^)]*\))',
            r'(BK4819_GetADC\s*\([^)]*\))',
            r'(gADC_Result\s*\[\s*\d+\s*\])',
            r'(\w+\s*=\s*\*\s*\(volatile uint16_t\s*\*\)\s*ADC_\w+)',
        ]

        patched_any = False
        for path in candidates:
            if not os.path.exists(path):
                continue
            with open(path) as f:
                content = f.read()

            if "SCRAMBLER_ProcessSample" in content:
                print(f"{path}: already patched, skipping.")
                patched_any = True
                continue

            for pat in adc_patterns:
                new_content = re.sub(
                    pat,
                    r'SCRAMBLER_ProcessSample(\1)',
                    content,
                    count=1
                )
                if new_content != content:
                    # Add include if not present
                    if '#include "App/scrambler.h"' not in new_content:
                        new_content = '#include "App/scrambler.h"\n' + new_content
                    with open(path, 'w') as f:
                        f.write(new_content)
                    print(f"Patched ADC read in {path}")
                    patched_any = True
                    break

        if not patched_any:
            print("WARNING: could not locate ADC read pattern — scrambler RX path may need manual hookup.")
        PYEOF

    # -----------------------------------------------------------------------
    # 6. Patch menu.c — add MESSENGER and SCRAMBLER menu entries
    # -----------------------------------------------------------------------
    - name: Patch menu.c
      run: |
        python3 - <<'PYEOF'
        import re, sys, os

        candidates = [
            "firmware/app/menu.c",
            "firmware/App/menu.c",
            "firmware/app/MENU.c",
        ]

        path = None
        content = None
        for c in candidates:
            if os.path.exists(c):
                with open(c) as f:
                    content = f.read()
                path = c
                break

        if path is None:
            print("WARNING: menu.c not found — menu entries need manual addition.")
            sys.exit(0)

        if "MESSENGER" in content:
            print(f"menu.c already patched ({path}), skipping.")
            sys.exit(0)

        # Find a natural insertion point — last menu item before closing brace/sentinel
        menu_entries = (
            '    { "MSG",       MENU_MESSENGER,  0, 0 },\n'
            '    { "SCRAMBL",   MENU_SCRAMBLER,  0, 0 },\n'
        )

        # Try to insert before a typical sentinel/end marker
        patched = re.sub(
            r'(\{\s*NULL\s*,\s*0\s*[,}])',
            menu_entries + r'\1',
            content,
            count=1
        )
        if patched == content:
            # Fallback: append before closing brace of the menu table
            patched = re.sub(
                r'(\};\s*$)',
                menu_entries + r'\1',
                content,
                count=1,
                flags=re.MULTILINE
            )

        with open(path, 'w') as f:
            f.write(patched)

        print(f"Patched {path}")
        PYEOF

    # -----------------------------------------------------------------------
    # 7. Pre-build sanity check
    # -----------------------------------------------------------------------
    - name: Verify patch symbols present
      run: |
        echo "Checking for required symbols..."
        MISSING=0

        for sym in MSG_Init MSG_TimeSlice10ms MSG_HandleKey SCRAMBLER_ProcessSample; do
          if ! grep -rq "$sym" firmware/; then
            echo "MISSING: $sym"
            MISSING=1
          else
            echo "OK: $sym"
          fi
        done

        if [ $MISSING -ne 0 ]; then
          echo "One or more required symbols are absent. Aborting build."
          exit 1
        fi

    # -----------------------------------------------------------------------
    # 8. Run the Docker-based build (unchanged from original workflow)
    # -----------------------------------------------------------------------
    - name: Compile firmware
      working-directory: firmware
      run: |
        chmod +x compile-with-docker.sh
        ./compile-with-docker.sh

    # -----------------------------------------------------------------------
    # 9. Artifact upload
    # -----------------------------------------------------------------------
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: f4hwn-messenger-scrambler
        path: firmware/compiled-firmware/f4hwn.packed.bin
        retention-days: 90

    # -----------------------------------------------------------------------
    # 10. GitHub Release attachment (on version tags)
    # -----------------------------------------------------------------------
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: firmware/compiled-firmware/f4hwn.packed.bin
        body: |
          ## UV-K5 V1/V2 Firmware – Messenger + Scrambler

          Built from F4HWN Fusion base with:
          - FSK SMS Messenger (ChaCha20-256 encrypted, CRC-16/CCITT-FALSE framed)
          - Frequency-inversion voice scrambler (10-bit ADC, DP32G030)

          **Flash with the Quansheng UV-K5 DFU tool. Backup EEPROM first.**
