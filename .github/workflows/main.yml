name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout our repo
      uses: actions/checkout@v4
      with:
        path: our-files
        fetch-depth: 1

    - name: Checkout firmware
      uses: actions/checkout@v4
      with:
        repository: armel/uv-k5-firmware-custom
        ref: main
        path: firmware
        fetch-depth: 1

    - name: Inject new source files
      run: |
        mkdir -p firmware/Helper firmware/App
        cp our-files/Helper/fsk.h     firmware/Helper/fsk.h
        cp our-files/Helper/fsk.c     firmware/Helper/fsk.c
        cp our-files/Helper/crypto.h  firmware/Helper/crypto.h
        cp our-files/Helper/crypto.c  firmware/Helper/crypto.c
        cp our-files/App/bk4819_fsk.h firmware/App/bk4819_fsk.h
        cp our-files/App/bk4819_fsk.c firmware/App/bk4819_fsk.c
        cp our-files/App/messenger.h  firmware/App/messenger.h
        cp our-files/App/messenger.c  firmware/App/messenger.c
        cp our-files/App/scrambler.h  firmware/App/scrambler.h

    - name: Patch settings.h
      run: python3 our-files/scripts/patch_settings.py firmware

    - name: Patch app.c
      run: python3 our-files/scripts/patch_app.py firmware

    - name: Patch audio ADC path
      run: python3 our-files/scripts/patch_audio_adc.py firmware

    - name: Patch menu.c
      run: python3 our-files/scripts/patch_menu.py firmware

    - name: Patch Makefile
      run: python3 our-files/scripts/patch_makefile.py firmware

    - name: Verify patch symbols present
      run: |
        MISSING=0
        for sym in MSG_Init MSG_TimeSlice10ms MSG_HandleKey SCRAMBLER_ProcessSample; do
          if grep -rq "$sym" firmware/; then
            echo "OK: $sym"
          else
            echo "MISSING: $sym"
            MISSING=1
          fi
        done
        if [ $MISSING -ne 0 ]; then exit 1; fi

    - name: Compile firmware
      working-directory: firmware
      run: |
        chmod +x compile-with-docker.sh
        ./compile-with-docker.sh broadcast

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: f4hwn-messenger-scrambler
        path: firmware/compiled-firmware/f4hwn.packed.bin
        retention-days: 90

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: firmware/compiled-firmware/f4hwn.packed.bin
        body: |
          UV-K5 V1/V2 Firmware with FSK Messenger and frequency-inversion scrambler.
          Flash with Quansheng DFU tool. Back up EEPROM first.
